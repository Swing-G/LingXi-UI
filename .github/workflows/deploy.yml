name: Deploy Frontend

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Pull latest code
        run: |
          cd /opt/frontend
          git pull origin master

      - name: Install & Build
        run: |
          cd /opt/frontend
          npm install --legacy-peer-deps
          npm run build

      - name: Deploy to Nginx
        run: |
          sudo rm -rf /var/www/zhiguang/*
          sudo cp -r /opt/frontend/dist/* /var/www/zhiguang/
          sudo systemctl reload nginx
          echo "✔ Frontend deployed"
